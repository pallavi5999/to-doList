<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES6 Todo — Learn by Doing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8f542;
    --accent2: #f5a623;
    --text: #f0f0f0;
    --muted: #6b6b6b;
    --done-bg: #1a1f0d;
    --tag-spread: #3b82f6;
    --tag-rest: #a855f7;
    --tag-arrow: #ec4899;
    --tag-destruct: #f59e0b;
    --tag-filter: #10b981;
    --tag-map: #06b6d4;
    --tag-reduce: #f97316;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 720px;
    margin-bottom: 40px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.6;
  }

  /* ── CONCEPT LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
  }

  /* ── INPUT AREA ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 12px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color .2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .priority-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 0 14px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .priority-select:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 0 22px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform .15s, opacity .15s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: .85; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* ── STATS BAR ── */
  .stats-bar {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 24px;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 2px;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .stat-num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .stat-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
  }

  .percent-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-left: auto;
  }

  .percent-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .4s ease;
  }

  /* ── FILTER TABS ── */
  .filter-tabs {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 0.04em;
  }

  .tab.active, .tab:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── TODO LIST ── */
  .todo-list {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .2s, opacity .2s;
    animation: slideIn .25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-item.done {
    background: var(--done-bg);
    opacity: .65;
  }

  .todo-item:hover { border-color: #3a3a3a; }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
    font-size: 13px;
    color: transparent;
  }

  .todo-item.done .check-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .todo-body { flex: 1; min-width: 0; }

  .todo-text {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .2s;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .priority-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .p-high  { background: #ef4444; }
  .p-mid   { background: var(--accent2); }
  .p-low   { background: var(--muted); }

  .priority-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .concept-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
    border-radius: 4px;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: #ef4444; background: rgba(239,68,68,.08); }

  /* ── CODE PANEL ── */
  .code-panel {
    width: 100%;
    max-width: 720px;
    margin-top: 40px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .code-panel-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .code-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  .code-tabs {
    display: flex;
    gap: 4px;
  }

  .code-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }

  .code-tab.active { border-color: var(--border); color: var(--text); }
  .code-tab:hover  { color: var(--text); }

  pre {
    background: #0a0a0a;
    padding: 24px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    color: #ccc;
  }

  .kw   { color: #c792ea; }
  .fn   { color: #82aaff; }
  .str  { color: #c3e88d; }
  .cm   { color: #546e7a; font-style: italic; }
  .acc  { color: var(--accent); font-weight: 500; }
  .num  { color: var(--accent2); }
  .op   { color: #89ddff; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  .empty-icon { font-size: 2rem; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">// ES6 in Practice</p>
  <h1>Todo <span>List</span></h1>
  <p class="subtitle">
    Every action below uses real ES6. Watch which concepts fire as you add, complete &amp; delete tasks.
  </p>
  <div class="legend" id="legend"></div>
</header>

<!-- INPUT -->
<div class="input-card">
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="What needs doing?" />
    <select class="priority-select" id="prioritySelect">
      <option value="high">🔴 High</option>
      <option value="mid" selected>🟡 Mid</option>
      <option value="low">⚪ Low</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar"></div>

<!-- FILTER TABS -->
<div class="filter-tabs" id="filterTabs"></div>

<!-- LIST -->
<div class="todo-list" id="todoList"></div>

<!-- CODE PANEL -->
<div class="code-panel">
  <div class="code-panel-header">
    <span class="code-panel-title">// Live ES6 Code</span>
    <div class="code-tabs" id="codeTabs"></div>
  </div>
  <pre id="codeDisplay"></pre>
</div>


<script>
// ─────────────────────────────────────────────
//  DATA & STATE
// ─────────────────────────────────────────────

let state = {
  todos: [
    { id: 1, text: "Learn Arrow Functions",     done: false, priority: "high" },
    { id: 2, text: "Practice Destructuring",    done: true,  priority: "mid"  },
    { id: 3, text: "Master Spread & Rest",      done: false, priority: "high" },
    { id: 4, text: "Use .filter() on arrays",   done: false, priority: "mid"  },
    { id: 5, text: "Map tasks to UI elements",  done: true,  priority: "low"  },
    { id: 6, text: "Reduce to get total count", done: false, priority: "low"  },
  ],
  filter: "all",
  nextId: 7,
  activeCode: "spread",
};

// ─────────────────────────────────────────────
//  CONCEPTS META
// ─────────────────────────────────────────────

const CONCEPTS = [
  { key: "spread",    label: "Spread ...",     color: "#3b82f6" },
  { key: "rest",      label: "Rest ...",       color: "#a855f7" },
  { key: "arrow",     label: "Arrow =>",       color: "#ec4899" },
  { key: "destruct",  label: "Destructuring",  color: "#f59e0b" },
  { key: "filter",    label: ".filter()",      color: "#10b981" },
  { key: "map",       label: ".map()",         color: "#06b6d4" },
  { key: "reduce",    label: ".reduce()",      color: "#f97316" },
];

// ─────────────────────────────────────────────
//  CONCEPT TAG per todo (rotate for demo)
// ─────────────────────────────────────────────

const conceptOrder = ["spread","rest","arrow","destruct","filter","map","reduce"];
const getConceptForId = id => conceptOrder[(id - 1) % conceptOrder.length];

// ─────────────────────────────────────────────
//  ES6 CODE SNIPPETS
// ─────────────────────────────────────────────

const CODE = {

  // ── SPREAD ───────────────────────────────────────────────────────────────
  spread: `<span class="cm">// SPREAD ( ... ) — used in addTask() when you click "+ Add"
// The spread operator copies every item from the OLD array
// into a brand-new array, then appends the new todo at the end.
// This keeps state IMMUTABLE — we never push() into the old array.</span>

<span class="kw">const</span> <span class="fn">addTask</span> <span class="op">=</span> () <span class="op">=></span> {
  <span class="kw">const</span> input    <span class="op">=</span> document.getElementById(<span class="str">"taskInput"</span>);
  <span class="kw">const</span> priority <span class="op">=</span> document.getElementById(<span class="str">"prioritySelect"</span>).value;
  <span class="kw">const</span> text     <span class="op">=</span> input.value.trim();

  <span class="cm">// Guard: do nothing if the input box is empty</span>
  <span class="kw">if</span> (!text) { input.focus(); <span class="kw">return</span>; }

  <span class="cm">// Build the new todo object (shorthand property: text = text)</span>
  <span class="kw">const</span> newTodo <span class="op">=</span> { id: state.nextId<span class="op">++</span>, text, done: <span class="kw">false</span>, priority };

  <span class="cm">// SPREAD in action:
  //   ...state.todos  →  expands all existing todos
  //   newTodo         →  appends the new one at the end
  //   Result: a fresh array, old array untouched</span>
  state.todos <span class="op">=</span> [<span class="acc">...state.todos</span>, newTodo];

  input.value <span class="op">=</span> <span class="str">""</span>;       <span class="cm">// clear the input field</span>
  state.activeCode <span class="op">=</span> <span class="str">"spread"</span>;
  render();               <span class="cm">// re-draw the entire UI</span>
};`,

  // ── REST ─────────────────────────────────────────────────────────────────
  rest: `<span class="cm">// REST ( ...params ) — used in getConceptForId() & renderList()
// REST is the OPPOSITE of Spread.
//   Spread:  expands  an array into individual items
//   Rest:    collects individual items into an array
//
// Here it appears in array destructuring inside renderList()
// to separate the first visible todo from all the remaining ones.</span>

<span class="cm">// --- Where REST appears in this app ---</span>

<span class="cm">// 1. conceptOrder holds all 7 ES6 concept keys</span>
<span class="kw">const</span> conceptOrder <span class="op">=</span> [<span class="str">"spread"</span>,<span class="str">"rest"</span>,<span class="str">"arrow"</span>,<span class="str">"destruct"</span>,<span class="str">"filter"</span>,<span class="str">"map"</span>,<span class="str">"reduce"</span>];

<span class="cm">// 2. Arrow fn uses % (modulo) to cycle through concepts by todo id</span>
<span class="kw">const</span> <span class="fn">getConceptForId</span> <span class="op">=</span> <span class="acc">id</span> <span class="op">=></span> conceptOrder[(id <span class="op">-</span> <span class="num">1</span>) <span class="op">%</span> conceptOrder.length];

<span class="cm">// 3. REST in destructuring — inside renderList() we can do:
//    const [first, ...remaining] = visible;
//    first     → the very first todo object
//    remaining → an array of ALL the other todos
//    (REST gathers "the rest" into one variable)</span>
<span class="kw">const</span> [first, <span class="acc">...remaining</span>] <span class="op">=</span> state.todos;
<span class="cm">//             ↑ rest parameter — collects everything after index 0</span>

console.log(<span class="str">"First todo:"</span>, first.text);
console.log(<span class="str">"Remaining count:"</span>, remaining.length);`,

  // ── ARROW ────────────────────────────────────────────────────────────────
  arrow: `<span class="cm">// ARROW FUNCTIONS ( => ) — used everywhere in this app
// Shorter syntax than 'function'. No own 'this' binding.
// When the body is a single expression, the return is IMPLICIT
// (no need to write the 'return' keyword).</span>

<span class="cm">// --- toggleTask: called when you click the ✓ checkbox ---</span>
<span class="cm">// Receives the todo's id, flips its 'done' boolean</span>
<span class="kw">const</span> <span class="fn">toggleTask</span> <span class="op">=</span> <span class="acc">id</span> <span class="op">=></span> {
  <span class="cm">// Arrow inside .map() — single expression, implicit return
  // Spread ( {...t} ) copies the todo, then overrides 'done'</span>
  state.todos <span class="op">=</span> state.todos.map(<span class="acc">t</span> <span class="op">=></span>
    t.id <span class="op">===</span> id ? { <span class="acc">...t</span>, done: <span class="op">!</span>t.done } : t
  );
  <span class="cm">//              ↑ ternary: if id matches → flip done, else keep t as-is</span>
  state.activeCode <span class="op">=</span> <span class="str">"arrow"</span>;
  render();
};

<span class="cm">// --- Other arrow functions in this app (one-liners) ---</span>
<span class="kw">const</span> <span class="fn">getConceptForId</span> <span class="op">=</span> <span class="acc">id</span>  <span class="op">=></span> conceptOrder[(id <span class="op">-</span> <span class="num">1</span>) <span class="op">%</span> conceptOrder.length];
<span class="kw">const</span> <span class="fn">setFilter</span>       <span class="op">=</span> <span class="acc">f</span>   <span class="op">=></span> { state.filter <span class="op">=</span> f; render(); };
<span class="kw">const</span> <span class="fn">setCode</span>         <span class="op">=</span> <span class="acc">key</span> <span class="op">=></span> { state.activeCode <span class="op">=</span> key; render(); };
<span class="kw">const</span> <span class="fn">escHtml</span>         <span class="op">=</span> <span class="acc">s</span>   <span class="op">=></span> s.replace(<span class="op">/</span>&amp;<span class="op">/</span>g, <span class="str">"&amp;amp;"</span>);`,

  // ── DESTRUCTURING ─────────────────────────────────────────────────────────
  destruct: `<span class="cm">// DESTRUCTURING — used in renderList(), renderStats(), renderLegend()
// Pulls specific properties OUT of an object (or array) by name,
// directly into variables. Avoids writing todo.id, todo.text, etc.</span>

<span class="cm">// --- renderList(): each todo object is destructured in the callback ---</span>
<span class="kw">const</span> <span class="fn">renderList</span> <span class="op">=</span> () <span class="op">=></span> {
  <span class="kw">const</span> visible <span class="op">=</span> state.todos.filter((<span class="acc">{ done }</span>) <span class="op">=></span> { <span class="cm">/* ... */</span> });
  <span class="cm">//                               ↑ destructure 'done' from each todo</span>

  document.getElementById(<span class="str">"todoList"</span>).innerHTML <span class="op">=</span> visible
    .map((<span class="acc">{ id, text, done, priority }</span>) <span class="op">=></span> {
    <span class="cm">// ↑ instead of (todo) => todo.id, todo.text ...
    //   we unpack all 4 properties right in the parameter list</span>
      <span class="kw">const</span> concept <span class="op">=</span> getConceptForId(id);
      <span class="kw">const</span> c        <span class="op">=</span> CONCEPTS.find(<span class="acc">x</span> <span class="op">=></span> x.key <span class="op">===</span> concept);
      <span class="kw">return</span> <span class="str">\`&lt;div class="todo-item \${done ? "done" : ""}"&gt;...\`</span>;
    }).join(<span class="str">""</span>);
};

<span class="cm">// --- renderStats(): destructure the object returned by .reduce() ---</span>
<span class="kw">const</span> <span class="acc">{ total, done, highLeft }</span> <span class="op">=</span> state.todos.reduce( <span class="cm">/* ... */</span> );
<span class="cm">// ↑ the reduce returns { total, done, highLeft }
//   destructuring unpacks all three into separate variables at once</span>

<span class="cm">// --- renderLegend(): destructure each concept object ---</span>
CONCEPTS.map((<span class="acc">{ key, label, color }</span>) <span class="op">=></span>
  <span class="str">\`&lt;span style="color:\${color}"&gt;\${label}&lt;/span&gt;\`</span>
);`,

  // ── FILTER ───────────────────────────────────────────────────────────────
  filter: `<span class="cm">// .filter() — used in deleteTask() and renderList()
// Creates a NEW array containing only items where the callback returns true.
// The original array is NEVER modified (non-destructive).</span>

<span class="cm">// --- deleteTask(): remove one todo by its id ---</span>
<span class="kw">const</span> <span class="fn">deleteTask</span> <span class="op">=</span> <span class="acc">id</span> <span class="op">=></span> {
  <span class="cm">// Keep every todo whose id does NOT match the one to delete.
  // { id: tid } renames 'id' to 'tid' to avoid clashing with the outer 'id'</span>
  state.todos <span class="op">=</span> state.todos.<span class="acc">filter</span>((<span class="acc">{ id: tid }</span>) <span class="op">=></span> tid <span class="op">!==</span> id);
  <span class="cm">//                                  ↑ renaming destructure</span>
  state.activeCode <span class="op">=</span> <span class="str">"filter"</span>;
  render();
};

<span class="cm">// --- renderList(): show only the todos that match the active tab ---</span>
<span class="kw">const</span> visible <span class="op">=</span> state.todos.<span class="acc">filter</span>((<span class="acc">{ done }</span>) <span class="op">=></span> {
  <span class="kw">if</span> (state.filter <span class="op">===</span> <span class="str">"pending"</span>) <span class="kw">return</span> <span class="op">!</span>done;  <span class="cm">// only incomplete</span>
  <span class="kw">if</span> (state.filter <span class="op">===</span> <span class="str">"done"</span>)    <span class="kw">return</span>  done;  <span class="cm">// only completed</span>
  <span class="kw">return</span> <span class="kw">true</span>;                                    <span class="cm">// "all" → keep everything</span>
});
<span class="cm">// state.todos is unchanged — 'visible' is a separate filtered copy</span>`,

  // ── MAP ──────────────────────────────────────────────────────────────────
  map: `<span class="cm">// .map() — used in renderList(), renderLegend(), renderFilterTabs(), renderCodeTabs()
// Transforms EVERY item in an array into something new.
// Returns a new array of the same length — original is untouched.</span>

<span class="cm">// --- renderList(): turn each todo object → an HTML string ---</span>
<span class="kw">const</span> <span class="fn">renderList</span> <span class="op">=</span> () <span class="op">=></span> {
  document.getElementById(<span class="str">"todoList"</span>).innerHTML <span class="op">=</span> visible
    .<span class="acc">map</span>((<span class="acc">{ id, text, done, priority }</span>) <span class="op">=></span> {
    <span class="cm">// Every todo object → a chunk of HTML markup (a string)</span>
      <span class="kw">const</span> c <span class="op">=</span> CONCEPTS.find(<span class="acc">x</span> <span class="op">=></span> x.key <span class="op">===</span> getConceptForId(id));
      <span class="kw">return</span> <span class="str">\`
        &lt;div class="todo-item \${done ? "done" : ""}"&gt;
          &lt;button onclick="toggleTask(\${id})"&gt;\${done ? "✓" : ""}&lt;/button&gt;
          &lt;div class="todo-text"&gt;\${text}&lt;/div&gt;
          &lt;span class="concept-tag"&gt;\${c.label}&lt;/span&gt;
        &lt;/div&gt;\`</span>;
    })
    .join(<span class="str">""</span>); <span class="cm">// join array of strings → one big HTML string</span>
};

<span class="cm">// --- renderLegend(): each concept object → a colored badge ---</span>
CONCEPTS.<span class="acc">map</span>((<span class="acc">{ key, label, color }</span>) <span class="op">=></span>
  <span class="str">\`&lt;span class="badge" style="color:\${color}"&gt;\${label}&lt;/span&gt;\`</span>
);

<span class="cm">// --- renderFilterTabs(): ["all","pending","done"] → 3 tab buttons ---</span>
FILTERS.<span class="acc">map</span>(<span class="acc">f</span> <span class="op">=></span> <span class="str">\`&lt;button onclick="setFilter('\${f}')"&gt;\${f}&lt;/button&gt;\`</span>);`,

  // ── REDUCE ───────────────────────────────────────────────────────────────
  reduce: `<span class="cm">// .reduce() — used in renderStats() to calculate the numbers in the stats bar
// Iterates every item and ACCUMULATES a single result (object, number, string…)
// Takes: (callback, initialValue)
// Callback receives: (accumulator, currentItem)</span>

<span class="cm">// --- renderStats(): walk every todo once, build a summary object ---</span>
<span class="kw">const</span> <span class="fn">renderStats</span> <span class="op">=</span> () <span class="op">=></span> {

  <span class="kw">const</span> <span class="acc">{ total, done, highLeft }</span> <span class="op">=</span> state.todos.<span class="acc">reduce</span>(
    (acc, <span class="acc">{ done, priority }</span>) <span class="op">=></span> ({
    <span class="cm">// Return a NEW accumulator object each iteration (don't mutate acc)</span>
      total:    acc.total <span class="op">+</span> <span class="num">1</span>,
      <span class="cm">// Increment 'done' count only when the todo is completed</span>
      done:     acc.done <span class="op">+</span> (done ? <span class="num">1</span> : <span class="num">0</span>),
      <span class="cm">// Count todos that are high priority AND still pending</span>
      highLeft: acc.highLeft <span class="op">+</span> (priority <span class="op">===</span> <span class="str">"high"</span> <span class="op">&&</span> <span class="op">!</span>done ? <span class="num">1</span> : <span class="num">0</span>),
    }),
    <span class="cm">// ↓ Initial value — accumulator starts here before first iteration</span>
    { total: <span class="num">0</span>, done: <span class="num">0</span>, highLeft: <span class="num">0</span> }
  );
  <span class="cm">// Result is destructured immediately into 3 variables ↑</span>

  <span class="kw">const</span> pct <span class="op">=</span> total ? Math.round((done <span class="op">/</span> total) <span class="op">*</span> <span class="num">100</span>) : <span class="num">0</span>;
  <span class="cm">// pct = completion percentage shown in the progress bar</span>
};`,
};

// ─────────────────────────────────────────────
//  ADD TASK  (uses Spread + Arrow)
// ─────────────────────────────────────────────

const addTask = () => {
  const input = document.getElementById("taskInput");
  const priority = document.getElementById("prioritySelect").value;
  const text = input.value.trim();
  if (!text) { input.focus(); return; }

  // ── SPREAD ─────────────────────────────
  const newTodo = { id: state.nextId++, text, done: false, priority };
  state.todos = [...state.todos, newTodo];

  input.value = "";
  state.activeCode = "spread";
  render();
};

document.getElementById("taskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

// ─────────────────────────────────────────────
//  TOGGLE  (uses Arrow + Spread inside map)
// ─────────────────────────────────────────────

const toggleTask = id => {
  // ── ARROW + SPREAD ─────────────────────
  state.todos = state.todos.map(t =>
    t.id === id ? { ...t, done: !t.done } : t
  );
  state.activeCode = "arrow";
  render();
};

// ─────────────────────────────────────────────
//  DELETE  (uses Filter)
// ─────────────────────────────────────────────

const deleteTask = id => {
  // ── FILTER ─────────────────────────────
  state.todos = state.todos.filter(({ id: tid }) => tid !== id);
  state.activeCode = "filter";
  render();
};

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────

const render = () => {
  renderLegend();
  renderStats();
  renderFilterTabs();
  renderList();
  renderCodeTabs();
  renderCode();
};

// ── Legend ──────────────────────────────────
const renderLegend = () => {
  const el = document.getElementById("legend");
  el.innerHTML = CONCEPTS
    .map(({ key, label, color }) =>   // ── MAP
      `<span class="badge" style="background:${color}18;color:${color};border-color:${color}40">${label}</span>`
    ).join("");
};

// ── Stats (uses Reduce) ──────────────────────
const renderStats = () => {
  // ── DESTRUCTURING + REDUCE ─────────────
  const { total, done, highLeft } = state.todos.reduce(
    (acc, { done, priority }) => ({
      total:    acc.total + 1,
      done:     acc.done  + (done ? 1 : 0),
      highLeft: acc.highLeft + (priority === "high" && !done ? 1 : 0),
    }),
    { total: 0, done: 0, highLeft: 0 }
  );

  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><span class="stat-num">${total}</span><span class="stat-label">TOTAL</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num">${done}</span><span class="stat-label">DONE</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num" style="color:#ef4444">${highLeft}</span><span class="stat-label">HIGH LEFT</span></div>
    <div class="percent-bar-wrap" title="${pct}% complete">
      <div class="percent-bar-fill" style="width:${pct}%"></div>
    </div>
    <span class="stat-label">${pct}%</span>
  `;
};

// ── Filter Tabs ──────────────────────────────
const FILTERS = ["all","pending","done"];

const renderFilterTabs = () => {
  document.getElementById("filterTabs").innerHTML = FILTERS
    .map(f =>   // ── MAP
      `<button class="tab ${state.filter===f?'active':''}"
        onclick="setFilter('${f}')">${f.toUpperCase()}</button>`
    ).join("");
};

const setFilter = f => {
  state.filter = f;
  state.activeCode = "filter";
  render();
};

// ── Todo List (uses Filter + Map) ────────────
const renderList = () => {
  // ── FILTER ─────────────────────────────
  const visible = state.todos.filter(({ done }) => {
    if (state.filter === "pending") return !done;
    if (state.filter === "done")    return  done;
    return true;
  });

  if (!visible.length) {
    document.getElementById("todoList").innerHTML =
      `<div class="empty"><div class="empty-icon">✓</div>No tasks here yet.</div>`;
    return;
  }

  // ── MAP ────────────────────────────────
  document.getElementById("todoList").innerHTML = visible
    .map(({ id, text, done, priority }) => {
      const concept = getConceptForId(id);
      const c = CONCEPTS.find(x => x.key === concept);
      const dotClass = priority === "high" ? "p-high" : priority === "mid" ? "p-mid" : "p-low";
      return `
        <div class="todo-item ${done?"done":""}" id="todo-${id}">
          <button class="check-btn" onclick="toggleTask(${id})" title="Toggle">${done?"✓":""}</button>
          <div class="todo-body">
            <div class="todo-text">${escHtml(text)}</div>
            <div class="todo-meta">
              <div class="priority-dot ${dotClass}"></div>
              <span class="priority-label">${priority.toUpperCase()}</span>
              <span class="concept-tag"
                style="background:${c.color}18;color:${c.color}">
                ${c.label}
              </span>
            </div>
          </div>
          <button class="del-btn" onclick="deleteTask(${id})" title="Delete">×</button>
        </div>`;
    }).join("");
};

// ── Code Tabs ────────────────────────────────
const renderCodeTabs = () => {
  document.getElementById("codeTabs").innerHTML = CONCEPTS
    .map(({ key, label }) =>   // ── MAP
      `<button class="code-tab ${state.activeCode===key?'active':''}"
        onclick="setCode('${key}')">${label}</button>`
    ).join("");
};

const setCode = key => {
  state.activeCode = key;
  render();
};

// ── Code Display ─────────────────────────────
const renderCode = () => {
  document.getElementById("codeDisplay").innerHTML = CODE[state.activeCode] || "";
};

// ─────────────────────────────────────────────
//  UTIL
// ─────────────────────────────────────────────

const escHtml = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────

render();
</script>
</body>
</html>
